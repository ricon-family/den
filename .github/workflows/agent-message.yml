# Agent Message Dispatcher
#
# This workflow is generated by `shimmer workflows:generate`.
# Do not edit directly - update the template in shimmer instead.
#
# Why conditional jobs instead of a single parameterized job?
# GitHub Actions doesn't support dynamic secret references (e.g., secrets.${{ inputs.agent }}_GITHUB_PAT).
# Each agent has their own secrets, so we need a conditional job per agent to map the correct secrets.
# Only one job runs per invocation based on the selected agent.

name: Agent Message

on:
  workflow_dispatch:
    inputs:
      agent:
        description: 'Agent to message'
        required: true
        type: choice
        options:
          - baby-joel
          - ikma
          - zeke
      message:
        description: 'Message for the agent'
        required: true
        type: string
      model:
        description: 'Claude model to use (optional)'
        required: false
        type: string

jobs:
  baby-joel:
    if: inputs.agent == 'baby-joel'
    uses: ./.github/workflows/agent-run.yml
    with:
      agent: baby-joel
      message: ${{ inputs.message }}
      model: ${{ inputs.model }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      AGENT_GITHUB_PAT: ${{ secrets.BABY_JOEL_GITHUB_PAT }}
      AGENT_GPG_PRIVATE_KEY: ${{ secrets.BABY_JOEL_GPG_PRIVATE_KEY }}
      AGENT_EMAIL_PASSWORD: ${{ secrets.BABY_JOEL_EMAIL_PASSWORD }}
      AGENT_MATRIX_PASSWORD: ${{ secrets.BABY_JOEL_MATRIX_PASSWORD }}
      AGENT_PASSPHRASE: ${{ secrets.BABY_JOEL_PASSPHRASE }}
      AGENT_GITHUB_PASSWORD: ${{ secrets.BABY_JOEL_GITHUB_PASSWORD }}

  ikma:
    if: inputs.agent == 'ikma'
    uses: ./.github/workflows/agent-run.yml
    with:
      agent: ikma
      message: ${{ inputs.message }}
      model: ${{ inputs.model }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      AGENT_GITHUB_PAT: ${{ secrets.IKMA_GITHUB_PAT }}
      AGENT_GPG_PRIVATE_KEY: ${{ secrets.IKMA_GPG_PRIVATE_KEY }}
      AGENT_EMAIL_PASSWORD: ${{ secrets.IKMA_EMAIL_PASSWORD }}
      AGENT_MATRIX_PASSWORD: ${{ secrets.IKMA_MATRIX_PASSWORD }}
      AGENT_PASSPHRASE: ${{ secrets.IKMA_PASSPHRASE }}
      AGENT_GITHUB_PASSWORD: ${{ secrets.IKMA_GITHUB_PASSWORD }}

  zeke:
    if: inputs.agent == 'zeke'
    uses: ./.github/workflows/agent-run.yml
    with:
      agent: zeke
      message: ${{ inputs.message }}
      model: ${{ inputs.model }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      AGENT_GITHUB_PAT: ${{ secrets.ZEKE_GITHUB_PAT }}
      AGENT_GPG_PRIVATE_KEY: ${{ secrets.ZEKE_GPG_PRIVATE_KEY }}
      AGENT_EMAIL_PASSWORD: ${{ secrets.ZEKE_EMAIL_PASSWORD }}
      AGENT_MATRIX_PASSWORD: ${{ secrets.ZEKE_MATRIX_PASSWORD }}
      AGENT_PASSPHRASE: ${{ secrets.ZEKE_PASSPHRASE }}
      AGENT_GITHUB_PASSWORD: ${{ secrets.ZEKE_GITHUB_PASSWORD }}

