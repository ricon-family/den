[settings]
experimental = true
quiet = true
task_output = "interleave"

[plugins]
shiv = "https://github.com/KnickKnackLabs/vfox-shiv"

[tools]
usage = "latest"
gum = "latest"
uv = "latest"                              # Python script execution (PEP 723 inline deps)
bats = "1.13.0"                          # Test runner; see test/ and notes/sessions-backup.md
mc = "latest"                              # MinIO client; used by sessions-backup:status / :list (recursive)
jq = "latest"                              # JSON manipulation; used by sessions-backup:pi
"shiv:blobs" = "latest"                    # Thin B2/S3 wrapper used by sessions-backup:pi / :wibey-era
"shiv:shimmer" = "0.1"                   # Agent orchestration + identity
"shiv:sessions" = "0.4"                   # Session transcripts
"shiv:modules" = "0.9.5"                  # Encrypted git submodules
"shiv:notes" = "0.8"                      # Encrypted shared notes
"shiv:threads" = "0.3.0"
"shiv:rudi" = "latest"                     # git-crypt wrapper — CI calls rudi install directly
"shiv:secrets" = "latest"                  # Provider-based secret management
"shiv:emails" = "0.6"                   # Email CLI for agents
"shiv:codebase" = "0.3.0"                 # Codebase linting + migrations
"shiv:farts" = "latest"                    # Frontmatter queries for agent:list

[_.codebase]
lint = ["mise-settings", "gum-table"]

[_.codebase.scope]
gum-table = ".mise/tasks"
