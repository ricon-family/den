[settings]
experimental = true
quiet = true
task_output = "interleave"

[plugins]
shiv = "https://github.com/KnickKnackLabs/vfox-shiv.git#e8b8c319fb1a25ecf6da7bf15030a2480af1d143"

[tools]
usage = "latest"
gum = "latest"
uv = "latest"                              # Python script execution (PEP 723 inline deps)
"shiv:shimmer" = "0.1.5"                 # Agent orchestration + identity
"shiv:sessions" = "0.4.2"                 # Session transcripts
"shiv:modules" = "0.9.5"                  # Encrypted git submodules
"shiv:notes" = "0.8.4"                    # Encrypted shared notes
"shiv:threads" = "0.3.0"
"shiv:rudi" = "latest"                     # git-crypt wrapper — CI calls rudi install directly
"shiv:secrets" = "latest"                  # Provider-based secret management
"shiv:emails" = "latest"                   # Email CLI for agents
"shiv:codebase" = "0.3.0"                 # Codebase linting + migrations
"shiv:farts" = "latest"                    # Frontmatter queries for agent:list

[_.codebase]
lint = ["mise-settings", "gum-table"]

[_.codebase.scope]
gum-table = ".mise/tasks"
