[settings]
experimental = true

[plugins]
shiv = "https://github.com/KnickKnackLabs/vfox-shiv"

[tools]
usage = "latest"
gum = "latest"
"shiv:shiv" = "0.1.0"                      # Package manager (self-hosted via vfox-shiv)
"shiv:shimmer" = "latest"                 # Agent orchestration + identity
"shiv:sessions" = "0.2.0"                 # Session transcripts (+ transitive: shell)
"shiv:notes" = "0.3.0"                    # Encrypted shared notes (+ transitive: rudi)
"shiv:rudi" = "0.2.0"                     # git-crypt wrapper (called directly by workflow)
"shiv:secrets" = "0.1.0"                  # Provider-based secret management
"shiv:shell" = "0.1.0"                    # Persistent terminal sessions

# git-crypt has no macOS ARM prebuilt binary — install via: rudi install

# Home — shared agent infrastructure
#
# Each agent has tasks in agents/<name>/.mise/tasks/
# Shared tasks go in .mise/tasks/
# Run `mise tasks` to see available tasks
